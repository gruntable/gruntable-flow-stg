<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 20px 20px 8px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #374151; }


    .section-bar { font-size: 11px; font-weight: 700; color: #111; letter-spacing: 0.3px; padding: 8px 12px; margin: 24px -20px 12px -20px; background: #f8f8f8; border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 6px; }
    .section-bar.first { margin-top: 12px; }
    .section-bar.orange { border-left: 3px solid #f59e0b; }

    .field { margin-bottom: 12px; }
    .label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
    textarea { width: 100%; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 13px; font-family: inherit; background: white; color: #374151; outline: none; resize: vertical; min-height: 180px; max-height: 600px; overflow-y: auto; line-height: 1.5; }
    textarea:focus { border-color: #6b7280; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; line-height: 1.5; }
  </style>
</head>
<body>


  <div class="section-bar orange first">📁 Content</div>

  <div class="field">
    <div class="label">Content</div>
    <textarea id="content" placeholder="Write instructions, context, or guidance for the user at this step..."></textarea>
    <div class="hint">Supports Markdown formatting (bold, lists, headings, etc.) and links: <a href="javascript:void(0)" onclick="this.setSelectionRange(0,0)">[link text](url)</a></div>
  </div>

  <script>
    document.getElementById('content').addEventListener('blur', function(e) {
      sendChange({ settings: { text: { content: e.target.value } } });
    });

    function applyState(data, isInit) {
      var contentEl = document.getElementById('content');
      if (isInit || document.activeElement !== contentEl) {
        contentEl.value = (data.settings && data.settings.text && data.settings.text.content) || '';
      }
    }

    window.addEventListener('message', function(e) {
      if (e.data.type === 'init') { currentNodeId = e.data.nodeId; applyState(e.data, true); notifyResize(); }
      if (e.data.type === 'stateUpdate') { applyState(e.data, false); notifyResize(); }
    });

    var currentNodeId = null;
    function sendChange(patch) {
      window.parent.postMessage({ type: 'settingsChange', patch: Object.assign({ nodeId: currentNodeId }, patch) }, '*');
    }

    notifyResize.lastHeight = 0;
    function notifyResize() {
      var h = document.body.offsetHeight;
      if (h === notifyResize.lastHeight) return;
      notifyResize.lastHeight = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }

    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(notifyResize).observe(document.body);
    }
    notifyResize();
  </script>
</body>
</html>
