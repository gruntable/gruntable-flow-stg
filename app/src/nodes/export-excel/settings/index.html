<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 20px 20px 8px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #374151; }


    /* Section bars */
    .section-bar { font-size: 11px; font-weight: 700; color: #111; letter-spacing: 0.3px; padding: 8px 12px; margin: 24px -20px 12px -20px; background: #f8f8f8; border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 6px; }
    .section-bar.first { margin-top: 12px; }
    .section-bar.green  { border-left: 3px solid #22c55e; }
    .section-bar.orange { border-left: 3px solid #f59e0b; }

    /* Fields */
    .field { margin-bottom: 12px; }
    .label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
    .required { color: #ef4444; font-size: 10px; font-weight: 700; }
    select, input[type="text"] { width: 100%; padding: 6px 10px; border: 1px solid #e5e7eb; border-radius: 4px; font-size: 13px; font-family: inherit; background: white; color: #374151; outline: none; }
    select:focus, input[type="text"]:focus { border-color: #6b7280; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; line-height: 1.5; }
    .error { font-size: 11px; color: #ef4444; margin-top: 4px; }
    .suffix-wrap { position: relative; }
    .suffix-wrap input { padding-right: 46px; }
    .suffix { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #9ca3af; pointer-events: none; user-select: none; }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; gap: 6px; margin-top: 12px; cursor: pointer; }
    .toggle-label { font-size: 12px; color: #374151; }
  </style>
</head>
<body>


  <!-- TABLE SOURCE (required, single) -->
  <div class="section-bar green first">📊 Table Source</div>
  <div class="field">
    <div class="label">Input table <span class="required">required</span></div>
    <select id="source-table" onchange="onSourceChange(this.value)">
      <option value="">-- Select table --</option>
    </select>
    <div id="source-error" class="error" style="display:none">Select an input table before running</div>
  </div>

  <!-- USER FORM -->
  <div class="section-bar orange">📁 User Form</div>

  <div class="field">
    <div class="label">File name <span class="required">required</span></div>
    <div class="suffix-wrap">
      <input type="text" id="filename" placeholder="e.g. report">
      <span class="suffix" id="ext-label" style="display:none">.xlsx</span>
    </div>
    <div id="filename-error" class="error" style="display:none">File name is required before running.</div>
  </div>

  <div class="label" style="margin-top: 24px;">Pause after step run</div>
  <label class="toggle-row">
    <input type="checkbox" id="pause-review" checked onchange="onPauseChange(this)">
    <span id="pause-label" class="toggle-label">Pause to review result before running the next step</span>
  </label>
  <div class="hint">When enabled, pauses after this step to allow review before continuing to the next step.</div>

  <script>
    var manifest = {};
    var allTables = [];
    var sourceTable = '';
    var pauseForReview = true;



    // ── Table Source ──
    function renderSourceTable() {
      var sel = document.getElementById('source-table');
      sel.innerHTML = '<option value="">-- Select table --</option>' + allTables.map(function(t) {
        return '<option value="' + t.replace(/"/g, '&quot;') + '"' + (t === sourceTable ? ' selected' : '') + '>' + t + '</option>';
      }).join('');
      document.getElementById('source-error').style.display = !sourceTable ? '' : 'none';
    }

    function onSourceChange(val) {
      sourceTable = val;
      document.getElementById('source-error').style.display = !val ? '' : 'none';
      sendChange({ sourceTables: [val] });
    }

    // ── File name ──
    document.getElementById('filename').addEventListener('input', function(e) {
      var base = e.target.value;
      document.getElementById('ext-label').style.display = base ? '' : 'none';
      document.getElementById('filename-error').style.display = !base ? '' : 'none';
    });

    document.getElementById('filename').addEventListener('blur', function(e) {
      var base = e.target.value.replace(/\.xlsx$/i, '').trim();
      var stored = base ? base + '.xlsx' : '';
      document.getElementById('ext-label').style.display = base ? '' : 'none';
      document.getElementById('filename-error').style.display = !stored ? '' : 'none';
      sendChange({ settings: { processing: { file_name: stored } } });
    });

    // ── Toggle ──
    function onPauseChange(el) {
      pauseForReview = el.checked;
      document.getElementById('pause-label').textContent = 'Wait for confirmation (' + (pauseForReview ? 'Manual' : 'Auto') + ')';
      sendChange({ settings: { processing: { pauseForReview: pauseForReview } } });
    }

    // ── Init / StateUpdate ──
    function applyState(data, isInit) {
      if (isInit) {
        manifest = data.manifest || {};
      }

      // Source table
      allTables = data.allTables || [];
      sourceTable = data.sourceTables && data.sourceTables[0] ? data.sourceTables[0] : (data.sourceTable || '');
      renderSourceTable();

      // Filename (stored in settings.processing.file_name, fallback to prompt for backwards compat)
      var filenameEl = document.getElementById('filename');
      if (isInit || document.activeElement !== filenameEl) {
        var stored = (data.settings && data.settings.processing && data.settings.processing.file_name) || data.prompt || '';
        var baseName = stored.replace(/\.xlsx$/i, '');
        filenameEl.value = baseName;
        document.getElementById('ext-label').style.display = baseName ? '' : 'none';
        document.getElementById('filename-error').style.display = !stored ? '' : 'none';
      }

      // Pause
      var p = (data.settings || {}).processing || {};
      pauseForReview = p.pauseForReview !== false;
      document.getElementById('pause-review').checked = pauseForReview;
      document.getElementById('pause-label').textContent = 'Wait for confirmation (' + (pauseForReview ? 'Manual' : 'Auto') + ')';
    }

    window.addEventListener('message', function(e) {
      if (e.data.type === 'init') { currentNodeId = e.data.nodeId; applyState(e.data, true); notifyResize(); }
      if (e.data.type === 'stateUpdate') { applyState(e.data, false); notifyResize(); }
      if (e.data.type === 'dataResponse' && e.data.resource === 'tables') {
        allTables = e.data.data || [];
        renderSourceTable();
      }
    });

    var currentNodeId = null;
    function sendChange(patch) {
      window.parent.postMessage({ type: 'settingsChange', patch: Object.assign({ nodeId: currentNodeId }, patch) }, '*');
    }

    notifyResize.lastHeight = 0;
    function notifyResize() {
      var h = document.body.offsetHeight;
      if (h === notifyResize.lastHeight) return;
      notifyResize.lastHeight = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }

    if (typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(notifyResize).observe(document.body);
    }
    notifyResize();
  </script>
</body>
</html>
